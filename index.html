<style>
:root{
  --txt:#0F2D52; --txt2:#3a567a; --muted:#6E8299;
  --accent:#FF3F6E; --accent-d:#D92954; --accentSoft:rgba(255,63,110,.1);
  --hero1:#e8313f; --hero2:#c41e2a;
  --good:#1fbf86; --goodSoft:rgba(31,191,134,.14);
  --warn:#e8a317; --warnSoft:rgba(232,163,23,.14);
  --exp:#ff5466; --expSoft:rgba(255,80,80,.12);
  --card:#fff; --field:#f4f8fc; --line:rgba(120,140,170,.16);
  --r:28px; --r-lg:36px; --r-sm:18px; --nav-h:78px;
  --sh:0 12px 0 #DDEAF5, 0 22px 40px rgba(29,90,150,.09);
  --sh-sm:0 8px 0 #E4EFF8, 0 14px 26px rgba(29,90,150,.08);
  --ff:'Fredoka','Nunito',system-ui,sans-serif;
  --fn:'Nunito',system-ui,sans-serif;
  --fb:'Inter',system-ui,sans-serif;
}

/* ===== INTRO ===== */
.intro{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;overflow:hidden;
  background:#000;opacity:1;transition:opacity .5s ease}
.intro.out{opacity:0;pointer-events:none}
.intro-bg{position:absolute;inset:0;
  background:
    radial-gradient(70% 60% at 78% 60%, rgba(229,30,40,.34), transparent 60%),
    radial-gradient(60% 50% at 10% 18%, rgba(229,30,40,.16), transparent 60%),
    #050505}
.intro-bg::after{content:"";position:absolute;inset:0;opacity:.5;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:14px 14px;-webkit-mask:linear-gradient(115deg,#000,transparent 55%);mask:linear-gradient(115deg,#000,transparent 55%)}
.intro-lasers{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.intro-lasers i{position:absolute;top:-30%;height:160%;width:2px;transform:rotate(28deg);
  background:linear-gradient(180deg,transparent,rgba(255,40,55,.85),transparent);filter:blur(.5px);
  opacity:0;animation:laserIn .9s ease forwards}
.intro-lasers i:nth-child(1){left:6%;animation-delay:.05s}
.intro-lasers i:nth-child(2){left:11%;height:120%;top:-10%;opacity:0;animation-delay:.18s;box-shadow:0 0 16px rgba(255,40,55,.7)}
.intro-lasers i:nth-child(3){left:88%;animation-delay:.12s}
@keyframes laserIn{0%{opacity:0;transform:rotate(28deg) translateY(40px)}60%{opacity:.9}100%{opacity:.55;transform:rotate(28deg)}}

.intro-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}

.intro-brand{position:relative;text-align:center;padding:0 18px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-height:100dvh}
.intro-robot{width:min(72vw,320px);margin-bottom:-6px;filter:drop-shadow(0 18px 50px rgba(229,30,40,.45));
  animation:robotIn 1s cubic-bezier(.16,1,.3,1) both, robotFloat 3.6s 1s ease-in-out infinite}
.intro-robot img{width:100%;display:block;
  -webkit-mask:linear-gradient(180deg,#000 78%,transparent);mask:linear-gradient(180deg,#000 78%,transparent)}
.intro-word{width:min(64vw,300px);margin-top:14px;animation:wordIn .7s .85s cubic-bezier(.2,.9,.25,1) both}
.intro-word img{width:100%;display:block;filter:drop-shadow(0 6px 18px rgba(229,30,40,.35))}
.intro-tag{margin:16px 0 max(40px,calc(env(safe-area-inset-bottom) + 30px));position:relative;width:min(86vw,440px)}
.intro-tag-line{display:block;height:2px;width:100%;margin:0 auto 12px;border-radius:99px;transform:scaleX(0);transform-origin:center;
  background:linear-gradient(90deg,transparent,#ff2233 35%,#ff6a78 50%,#ff2233 65%,transparent);
  box-shadow:0 0 14px rgba(255,40,55,.7);animation:lineGrow .6s 1.25s cubic-bezier(.7,0,.3,1) forwards}
.intro-tag p{font-family:var(--fn);font-weight:900;letter-spacing:.22em;font-size:clamp(11px,3.1vw,15px);
  color:#eef2f7;opacity:0;animation:tagIn .6s 1.45s ease forwards}
.intro-tag p b{color:#ff2f3e}

.intro-skip{position:absolute;bottom:max(22px,env(safe-area-inset-bottom));right:20px;z-index:2;
  font-family:var(--fn);font-weight:800;font-size:13px;color:#dfe8f2;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:9px 16px;border-radius:99px;backdrop-filter:blur(6px);
  opacity:0;animation:tagIn .5s .6s ease forwards}
.intro-skip:active{transform:translateY(1px)}

@keyframes robotIn{0%{opacity:0;transform:translateY(70px) scale(.92)}100%{opacity:1;transform:none}}
@keyframes robotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wordIn{0%{opacity:0;transform:translateY(16px) scale(.96)}100%{opacity:1;transform:none}}
@keyframes lineGrow{to{transform:scaleX(1)}}
@keyframes tagIn{to{opacity:1}}
@media(prefers-reduced-motion:reduce){.intro-robot,.intro-word,.intro-tag-line,.intro-tag p,.intro-lasers i,.intro-skip{animation-duration:.01ms!important;opacity:1!important;transform:none!important}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
html,body{
  background:
    radial-gradient(560px 320px at -12% -8%, rgba(255,236,95,.72), transparent 62%),
    radial-gradient(560px 320px at 112% -8%, rgba(46,199,255,.46), transparent 64%),
    linear-gradient(180deg,#FFFFFF 0%,#EEF7FF 56%,#F8FBFF 100%) fixed;
  color:var(--txt); font-family:var(--fb); -webkit-font-smoothing:antialiased;
  min-height:100dvh; overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.hide{display:none!important}
h1,h2,h3,.disp{font-family:var(--ff)}

.wrap{width:100%;max-width:520px;margin:0 auto;padding:14px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px)}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:13px;padding:4px 2px 14px}
.av-brand{width:62px;height:62px;border-radius:22px;overflow:hidden;flex:none;background:#10284B;
  box-shadow:0 10px 0 #DDEAF5,0 18px 30px rgba(25,75,130,.14)}
.av-brand img{width:190%;height:190%;object-fit:cover;object-position:50% 15%;transform:translateY(-2px)}
.tb-txt{flex:1;min-width:0}
.tb-txt h1{font-size:31px;letter-spacing:-.4px;line-height:1}
.tb-txt .greet{display:block;font-size:14px;color:var(--muted);font-weight:800;font-family:var(--fn);margin-top:4px}
.tb-txt .fecha-hora{display:block;font-size:12.5px;color:#7890AA;font-weight:800;font-family:var(--fn);margin-top:2px}
.icon-btn{width:54px;height:54px;border-radius:20px;background:#fff;display:grid;place-items:center;
  flex:none;box-shadow:var(--sh-sm);transition:.15s}
.icon-btn:active{transform:translateY(2px)}
.icon-btn svg{width:22px;height:22px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.screen{display:none;animation:fade .3s ease both}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.scr-title{font-size:32px;letter-spacing:-.6px;margin:6px 2px 16px}

/* HERO */
.hero{border-radius:30px;padding:20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden;min-height:136px;
  background:linear-gradient(135deg,var(--hero1),var(--hero2));box-shadow:0 14px 0 #f3c9cd,0 26px 44px rgba(200,30,42,.18)}
.hero .hl{font-family:var(--fn);font-weight:900;letter-spacing:.18em;font-size:12px;opacity:.9}
.hero .hv{font-family:var(--ff);font-weight:700;font-size:clamp(40px,11vw,50px);line-height:1;margin-top:10px;letter-spacing:-1.5px}
.hero .hs{font-size:13.5px;opacity:.9;margin-top:10px;font-weight:600}

/* STATS */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{border-radius:24px;padding:15px 12px;background:#fff;box-shadow:var(--sh-sm)}
.stat .si{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;margin-bottom:11px}
.stat .si svg{width:18px;height:18px;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.stat .sv{font-family:var(--ff);font-weight:700;font-size:24px;line-height:1}
.stat .sl{font-size:11.5px;color:var(--muted);font-weight:700;font-family:var(--fn);margin-top:5px}
.si.exp{background:var(--expSoft);color:var(--exp)} .si.warn{background:var(--warnSoft);color:var(--warn)} .si.good{background:var(--goodSoft);color:var(--good)}
.si3{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;margin-bottom:10px;font-size:24px;line-height:1;
  box-shadow:0 6px 0 rgba(0,0,0,.12), inset 0 2px 3px rgba(255,255,255,.65), inset 0 -4px 6px rgba(0,0,0,.10);
  transition:transform .12s ease}
.stat:active .si3{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.12), inset 0 2px 3px rgba(255,255,255,.6)}
.si3.exp{background:linear-gradient(160deg,#FFE2E2,#FFB4B4)}
.si3.warn{background:linear-gradient(160deg,#FFF0CC,#FFD874)}
.si3.good{background:linear-gradient(160deg,#D6F5DF,#9BE8B4)}

/* CARD */
.card{border-radius:var(--r);padding:18px;margin-bottom:14px;background:#fff;box-shadow:var(--sh)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h h2{font-size:19px;letter-spacing:-.2px}
.card-h a{font-size:13px;color:var(--accent);font-weight:800;font-family:var(--fn)}

/* RENEW / SERVICE ROWS */
.renew{display:flex;flex-direction:column;gap:9px}
.renew-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:20px;background:var(--field)}
.renew-item .av{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-family:var(--ff);
  font-weight:700;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-d));flex:none}
.renew-item .meta{flex:1;min-width:0}
.renew-item .nm{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.renew-item .pl{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:1px}
.pill{display:inline-block;padding:5px 11px;border-radius:11px;font-size:11.5px;font-weight:800;font-family:var(--fn);white-space:nowrap}
.pill.ok{color:var(--good);background:var(--goodSoft)}
.pill.due{color:var(--accent);background:var(--accentSoft)}
.pill.soon{color:var(--warn);background:var(--warnSoft)}
.pill.exp{color:var(--exp);background:var(--expSoft)}
.pill.mut{color:var(--muted);background:var(--field)}

/* CLIENT CARD */
.cli-card{border-radius:var(--r);padding:16px;margin-bottom:12px;background:#fff;box-shadow:var(--sh)}
.cli-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cli-name{font-family:var(--ff);font-weight:700;font-size:18px;letter-spacing:-.2px}
.cli-tel{font-size:13px;color:var(--muted);font-weight:600;margin-top:1px}
.svc-list{margin-top:13px;display:flex;flex-direction:column;gap:9px}
.svc{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--field);border-radius:18px;padding:12px 13px}
.svc .dot-s{width:9px;height:9px;border-radius:50%;flex:none}
.dot-s.ok{background:var(--good)} .dot-s.soon{background:var(--warn)} .dot-s.due,.dot-s.exp{background:var(--exp)} .dot-s.mut{background:var(--muted)}
.svc .nm{font-weight:700;font-size:14px}
.svc .mt{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.cli-actions{display:flex;gap:9px;margin-top:13px}
.act{flex:1;text-align:center;padding:12px;border-radius:16px;font-family:var(--fn);font-weight:800;font-size:13.5px;transition:.15s}
.act:active{transform:translateY(1px)}
.act.primary{background:var(--accent);color:#fff;box-shadow:0 6px 0 var(--accent-d)}
.act.ghost{background:var(--field);color:var(--txt)}

/* SEARCH + SEG */
.search{display:flex;align-items:center;gap:10px;background:#fff;border-radius:20px;padding:14px 16px;margin-bottom:13px;box-shadow:var(--sh-sm)}
.search svg{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:2;flex:none}
.search input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-weight:600}
.search input::placeholder{color:var(--muted)}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;padding:12px;border-radius:16px;background:#fff;color:var(--muted);font-family:var(--fn);font-weight:800;font-size:13px;box-shadow:var(--sh-sm);transition:.15s}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 6px 0 var(--accent-d)}
.variant-seg,.service-seg{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;margin-left:-2px;margin-right:-2px;padding-left:2px;padding-right:2px}
.variant-seg::-webkit-scrollbar,.service-seg::-webkit-scrollbar{display:none}
.variant-seg button,.service-seg button{flex:0 0 auto;white-space:nowrap;padding:11px 16px}

/* PRECIOS */
.price{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.price.has-det{cursor:pointer}
.det-caret{font-size:11px;color:var(--accent);transition:transform .2s;display:inline-block}
.price.open .det-caret{transform:rotate(180deg)}
.price-det{max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s ease;font-family:var(--fn);font-weight:700;font-size:13.5px;color:var(--txt);line-height:1.9;white-space:pre-line;border-bottom:1px solid var(--line)}
.price-det.show{max-height:600px;padding:12px 0 16px}
.price:last-child{border:none}
.price .pn{font-weight:700;font-size:15px}
.price .psub{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}
.price .pv{font-family:var(--ff);font-weight:700;font-size:16px;color:var(--good)}

/* AULA */
.aula-wrap{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);height:calc(100dvh - 240px);min-height:420px;background:#fff}
.aula-wrap iframe{width:100%;height:100%;border:0}

/* EMPTY / SPIN */
.empty{text-align:center;padding:44px 24px;color:var(--muted);font-weight:600}
.empty .ico{font-size:42px;margin-bottom:12px}
.empty b{display:block;color:var(--txt);font-family:var(--ff);font-size:18px;margin-bottom:6px}
.spin{width:34px;height:34px;border:3px solid #dfeaf5;border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:70px auto}
@keyframes sp{to{transform:rotate(360deg)}}

/* NAV */
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(520px,100%);height:var(--nav-h);z-index:20;
  display:flex;justify-content:space-around;align-items:center;

  padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);
  font-family:var(--fn);font-weight:900;font-size:10px;padding:8px 1px;position:relative;transition:.15s;line-height:1.05;text-align:center}
.nav-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.on{color:var(--accent)}
.nav-btn.on::before{content:"";position:absolute;top:0;width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}

/* LOGIN */
#login{position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px;overflow-y:auto;
  background:
    radial-gradient(520px 280px at 15% 2%,#FFF3B1,transparent 62%),
    radial-gradient(520px 300px at 100% 0,#B8F1FF,transparent 62%),
    linear-gradient(180deg,#FFFFFF,#EEF7FF)}
.login-robot{width:min(42vw,150px);border-radius:34px;background:#10284B;overflow:hidden;
  box-shadow:0 16px 0 #DDEAF5,0 30px 50px rgba(25,75,130,.2);animation:floaty 3.5s ease-in-out infinite;flex:none}
.login-robot img{width:120%;height:120%;object-fit:cover;object-position:50% 12%;display:block;transform:translate(-8%,-6%)}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.login-card{width:100%;max-width:360px;margin-top:22px;background:#fff;border-radius:34px;padding:28px 24px;
  box-shadow:0 18px 0 rgba(213,229,243,.75),0 32px 54px rgba(26,70,118,.12)}

.field{display:flex;align-items:center;gap:11px;background:var(--field);border:2px solid transparent;
  border-radius:18px;padding:15px 16px;margin-bottom:12px;transition:.15s}
.field:focus-within{border-color:var(--accent)}
.field svg{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:2;flex:none}
.field input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-weight:600}
.field input::placeholder{color:var(--muted)}

.login-foot{font-size:11.5px;color:var(--muted);text-align:center;font-weight:700;margin-top:18px;line-height:1.5}

/* ADMIN (modo dios) */

  background:#10284B;color:#fff;border-radius:18px;padding:11px 14px;margin-bottom:14px;box-shadow:var(--sh-sm)}

ons{flex-wrap:wrap}.cobro-actions .act{min-width:31%}@media(min-width:700px){.wrap{max-width:430px}.today-card h2{font-size:26px!important}.wallet-card .hv{font-size:38px!important}}

<body>

<!-- INTRO -->
<div id="intro" class="intro">
  <div class="intro-bg"></div>
  <div class="intro-lasers"><i></i><i></i><i></i></div>
  <video id="introVid" class="intro-vid hide" muted autoplay playsinline preload="auto"></video>
  <div id="introBrand" class="intro-brand">
    <div class="intro-robot"><img src="" id="introRobot" alt="Subli"></div>
    <div class="intro-word"><img src="" id="introWord" alt="Sublicuentas"></div>
    <div class="intro-tag">
      <span class="intro-tag-line"></span>
      <p>CONECTAMOS <b>TU</b> ENTRETENIMIENTO</p>
    </div>

<!-- LOGIN -->
<div id="login">

  <div class="login-card">

    <p>Entrá con tu usuario y tu clave</p>
    <div class="field">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

    </div>
    <div class="field">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

<nav class="nav hide" id="nav">

<!-- COBRO MODAL -->

<script>
let rev=null, clientes=[], cobroTel='', current='inicio';
let isAdmin=false, adminToken=null, adminRevs=[], impersonating=false;

/* API */
const API={
  base:CONFIG.apiBase.replace(/\/$/,''),
  token:st('get','rev_token'),
  setToken(t){this.token=t;st('set','rev_token',t)},
  clear(){this.token=null;st('del','rev_token');st('del','rev_data')},
  async call(path,opts={}){
    const r=await fetch(this.base+path,{...opts,headers:{'Content-Type':'application/json',
      ...(this.token?{Authorization:'Bearer '+this.token}:{}),...(opts.headers||{})}});
    if(r.status===401){this.clear();throw{code:'auth'}}
    if(!r.ok){let e={};try{e=await r.json()}catch(_){};throw e}
    return r.json();
  }
};
function st(op,k,v){try{if(op==='get')return localStorage.getItem(k);if(op==='set')localStorage.setItem(k,v);if(op==='del')localStorage.removeItem(k)}catch(e){return null}}

/* helpers */
function pick(o,keys){for(const k of keys){if(o&&o[k]!=null&&o[k]!=='')return o[k]}return null}
function norm(s){return(s||'').toString().trim().toLowerCase()}
function parseFecha(v){
  if(v==null)return null;
  if(typeof v==='object'){if(v.seconds)return new Date(v.seconds*1000);if(v._seconds)return new Date(v._seconds*1000);if(v.toDate)return v.toDate()}
  if(typeof v==='number')return new Date(v<1e12?v*1000:v);
  const s=v.toString().trim();
  let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){let[,d,mo,y]=m;y=y.length===2?'20'+y:y;return new Date(+y,+mo-1,+d)}
  const d=new Date(s);return isNaN(d)?null:d;
}
function fmtFecha(d){return d?d.toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'numeric'}):'—'}
function dias(d){if(!d)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((d-h)/86400000)}
function estado(d){const n=dias(d);
  if(n===null)return{c:'mut',t:'Sin fecha',n:9999};
  if(n<0)return{c:'exp',t:`Venció hace ${Math.abs(n)}d`,n};
  if(n===0)return{c:'due',t:'Vence hoy',n};
  if(n<=CONFIG.avisoDias)return{c:'soon',t:`En ${n}d`,n};
  return{c:'ok',t:`En ${n}d`,n};
}
function nombreCli(c){return c.nombrePerfil||c.nombre||c.nombre_norm||'Cliente'}
function revName(r=rev){
  if(!r)return 'socio';
  const raw=(r.nombre||r.nombre_norm||'').toString().trim();
  const user=(r.usuario||r.user||r.username||r.alias||'').toString().trim();
  const bad=['sublicuentas','sublichat','admin','administrador'];
  if(raw && !bad.includes(norm(raw)))return raw;
  if(user && !bad.includes(norm(user)))return user;
  return raw||user||'socio';
}
const enc=s=>(s||'').toString().replace(/"/g,'&quot;');

const MOTIVACION=[
  'Cada no te acerca a un sí. Seguí tocando puertas.',
  'La venta de hoy empieza con el primer mensaje bien enviado.',
  'Un cliente bien atendido se convierte en recomendación.',
  'No venda barato: venda confianza, rapidez y solución.',
  'Su disciplina cobra aunque usted todavía no vea el resultado.',
  'Hoy no se improvisa: hoy se ordena, se cobra y se renueva.',
  'El seguimiento vende más que la suerte.',
  'La constancia gana donde el talento se distrae.',
  'Cada renovación es una relación que usted cuidó.',
  'Primero orden, luego ventas; primero servicio, luego crecimiento.',
  'Una respuesta rápida vale más que una promoción gigante.',
  'El cliente vuelve donde le resuelven sin complicarlo.',
  'No persiga ventas: construya confianza y las ventas llegan.',
  'La diferencia está en cobrar a tiempo y atender con respeto.',
  'Hoy puede ser el día que un referido le abre diez puertas.',
  'El negocio crece cuando usted mide, corrige y vuelve a intentar.',
  'Vender es servir con estrategia.',
  'No compita solo por precio; compita por experiencia.',
  'Un mensaje claro evita reclamos y aumenta renovaciones.',
  'La marca se construye en cada chat.',
  'La mejor publicidad es un cliente satisfecho hablando por usted.',
  'No espere motivación: ejecute y la motivación aparece.',
  'El que organiza su cartera, domina sus ingresos.',
  'Hoy toca sembrar confianza para cosechar renovaciones.',
  'La rapidez vende, pero la claridad fideliza.',
  'No deje clientes fríos: un seguimiento amable reactiva ventas.',
  'El negocio no se detiene; se ajusta y avanza.',
  'La venta pequeña de hoy puede traer el cliente grande de mañana.',
  'Usted no solo vende cuentas: vende comodidad.',
  'Una cartera sana empieza con vencimientos bajo control.',
  'El buen vendedor no insiste: acompaña con inteligencia.',
  'La energía correcta en el mensaje cambia la respuesta del cliente.',
  'Donde otros abandonan, usted hace seguimiento.',
  'No subestime el poder de un buen “buenos días”.',
  'El cliente compra seguridad antes que precio.',
  'Hoy no es para quejarse; es para mover la cartera.',
  'Si cuida el detalle, cuida la ganancia.',
  'Menos excusas, más mensajes enviados.',
  'La confianza se gana cumpliendo lo prometido.',
  'Un negocio serio se nota desde el primer texto.',
  'La paciencia también es parte de la estrategia.',
  'Vender más empieza por atender mejor.',
  'Quien controla sus renovaciones controla su flujo.',
  'El mejor cierre es una solución simple.',
  'Haga que comprarle sea fácil, rápido y seguro.',
  'Hoy ordena su panel; mañana ordena sus ganancias.',
  'El seguimiento no molesta cuando aporta valor.',
  'La actitud abre la puerta, el servicio la mantiene abierta.',
  'No espere clientes perfectos; cree procesos claros.',
  'La constancia convierte contactos en cartera.',
  'Un cliente que entiende, paga con menos objeciones.',
  'La marca que responde rápido se queda en la mente.',
  'La venta se cierra mejor cuando el mensaje es directo.',
  'Revise, cobre, renueve: tres pasos para crecer.',
  'La excelencia diaria hace que el precio pese menos.',
  'El cliente no siempre recuerda el precio, pero sí cómo lo atendieron.',
  'Haga de cada renovación una oportunidad para vender más.',
  'El enfoque de hoy paga la tranquilidad de mañana.',
  'No venda por necesidad: venda con estrategia.',
  'El orden es el socio silencioso de todo vendedor.'
];
function motivacionDelDia(){
  const n=new Date();
  const y=n.getFullYear();
  const start=new Date(y,0,0);
  const day=Math.floor((n-start)/86400000);
  return MOTIVACION[(day+(y*17))%MOTIVACION.length];
}
function num(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return Number.isFinite(v)?v:0;
  let s=v.toString().replace(/[^\d,.-]/g,'').trim();
  if(!s)return 0;
  const c=s.lastIndexOf(','), d=s.lastIndexOf('.');
  if(c>-1&&d>-1){s=c>d?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'')}
  else if(c>-1){const dec=s.length-c-1;s=dec===2?s.replace(',','.'):s.replace(/,/g,'')}
  else if(d>-1){const dec=s.length-d-1;if(dec!==2)s=s.replace(/\./g,'')}
  const n=parseFloat(s);return Number.isFinite(n)?n:0;
}
function precioServicio(s){return num(pick(s,CONFIG.campos.precio))}
function money(n){return 'Lps. '+Math.round(n||0).toLocaleString('es-HN')}
function esVigente(e){return e.n>=0&&e.n<9999}
function clienteTieneVigente(c){return (Array.isArray(c.servicios)?c.servicios:[]).some(s=>esVigente(estado(parseFecha(pick(s,CONFIG.campos.vencimiento)))))}
/* Vigente = tiene al menos un servicio en fecha. No vigente = dejó de contratar (todos vencidos). */
function esClienteVigente(c){return clienteTieneVigente(c)}
function esClienteNoVigente(c){
  const svcs=Array.isArray(c.servicios)?c.servicios:[];
  if(!svcs.length||clienteTieneVigente(c))return false;
  return svcs.some(s=>estado(parseFecha(pick(s,CONFIG.campos.vencimiento))).n<0);
}
function estadoCliente(c){
  if(esClienteVigente(c))return{c:'ok',t:'Vigente'};
  if(esClienteNoVigente(c))return{c:'exp',t:'No vigente'};
  return{c:'mut',t:'Sin fecha'};
}

function flat(){const out=[];
  clientes.forEach(c=>(Array.isArray(c.servicios)?c.servicios:[]).forEach(s=>{
    const f=parseFecha(pick(s,CONFIG.campos.vencimiento));
    out.push({cliente:c,nombre:pick(s,CONFIG.campos.servicio)||'Servicio',fecha:f,est:estado(f),precio:precioServicio(s)});
  }));
  return out.sort((a,b)=>a.est.n-b.est.n);
}

function actualizarFechaHora(){
  const el=document.getElementById('fechaHora');
  if(!el)return;
  const n=new Date();
  el.textContent=n.toLocaleDateString('es-HN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+' · '+n.toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit'});
}
setInterval(actualizarFechaHora,60000);

/* login */
async function doLogin(){
  const usuario=inUser.value.trim(), password=inPass.value.trim();
  loginErr.textContent='';
  if(!usuario||!password){loginErr.textContent='Escribí tu usuario y tu clave.';return}
  if(CONFIG.apiBase.includes('TU-BOT')){loginErr.textContent='Falta poner la URL de la API (CONFIG.apiBase).';return}
  loginBtn.disabled=true; loginBtn.textContent='Entrando…';
  try{
    const res=await API.call('/rev/login',{method:'POST',body:JSON.stringify({usuario,password})});
    API.setToken(res.token);
    if(res.admin){
      isAdmin=true; adminToken=res.token;
      st('set','rev_admin','1'); st('del','rev_data');
      enterAdmin();
      return;
    }
    rev={nombre:res.nombre,nombre_norm:res.nombre_norm,usuario:res.usuario||usuario};
    st('set','rev_data',JSON.stringify(rev)); st('del','rev_admin');
    enterApp();
  }catch(e){
    const map={credenciales:'Usuario o clave incorrectos.',inactivo:'Tu cuenta está inactiva.',faltan_datos:'Faltan datos.'};
    loginErr.textContent=map[e.error]||'No pude conectar. Revisá la URL de la API.';
  }finally{loginBtn.disabled=false;loginBtn.textContent='Entrar'}
}
function enterApp(){
  login.classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('nav').classList.remove('hide');
  greet.textContent='Hola, '+revName();
  actualizarFechaHora();
  toggleImpBar();
  loadClientes();
  loadAvisos();
}
function toggleImpBar(){
  const b=document.getElementById('impBar');
  if(impersonating){
    b.className='imp-bar';
    b.innerHTML=`<div class="lbl">👁 Viendo como <b>${revName()}</b></div><button onclick="volverAdmin()">Volver</button>`;
  } else { b.className='hide'; b.innerHTML=''; }
}
function logout(){API.clear();st('del','rev_admin');location.reload()}

/* ── ADMIN (modo dios, solo lectura) ── */
let admF='';
async function enterAdmin(){
  impersonating=false;
  login.classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('nav').classList.add('hide');
  document.getElementById('impBar').className='hide';
  greet.textContent='Modo administrador';
  actualizarFechaHora();
  content.innerHTML='<div class="spin"></div>';
  try{ adminRevs=await API.call('/rev/admin/revendedores',{headers:{Authorization:'Bearer '+adminToken}}); renderAdmin(); }
  catch(e){ if(e.code==='auth'){location.reload();return}
    content.innerHTML=`<div class="card"><div class="empty"><div class="ico">⚠️</div><b>No pude cargar los socios</b>Revisá la API.</div></div>`; }
}
function renderAdmin(){
  const totCli=adminRevs.reduce((a,r)=>a+r.clientes,0);
  const totVenc=adminRevs.reduce((a,r)=>a+r.vencidos,0);
  const activos=adminRevs.filter(r=>r.activo).length;
  content.innerHTML=`
  <div class="hero">
    <div class="hl">RED DE SOCIOS</div>
    <div class="hv">${adminRevs.length}</div>
    <div class="hs">${activos} activos · ${totCli} clientes · ${totVenc} vencidos</div>
  </div>
  <div class="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="admSearch" placeholder="Buscar socio" oninput="admF=this.value;renderAdmList()">
  </div>
  <div id="admList"></div>`;
  renderAdmList();
}
function renderAdmList(){
  const f=norm(admF);
  const list=adminRevs.filter(r=>!f||norm(r.nombre).includes(f)||r.nombre_norm.includes(f));
  document.getElementById('admList').innerHTML=list.length?list.map(revCard).join(''):
    `<div class="card"><div class="empty"><div class="ico">🔍</div>Sin resultados.</div></div>`;
}
function revCard(r){
  const ini=(r.nombre[0]||'?').toUpperCase();
  const parts=[`${r.clientes} ${r.clientes===1?'cliente':'clientes'}`];
  if(r.vencidos)parts.push(`<span class="x">${r.vencidos} vencidos</span>`);
  if(r.porVencer)parts.push(`<span class="w">${r.porVencer} por vencer</span>`);
  return `<div class="rev-card" onclick='verComo(${JSON.stringify(r.id)},${JSON.stringify(r.nombre_norm)},${JSON.stringify(r.nombre)})'>
    <div class="rav ${r.activo?'':'off'}">${ini}</div>
    <div class="ri"><div class="rn">${r.nombre}${r.activo?'':' <span class="rev-off-tag">inactivo</span>'}</div>
      <div class="rs">${parts.join('<span style="opacity:.4">·</span>')}</div></div>
    <div class="go"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
  </div>`;
}
async function verComo(id,nombre_norm,nombre){
  try{
    const res=await API.call('/rev/admin/impersonate',{method:'POST',body:JSON.stringify({id,nombre_norm}),headers:{Authorization:'Bearer '+adminToken}});
    API.token=res.token;                 // token del socio solo en memoria
    rev={nombre:res.nombre,nombre_norm:res.nombre_norm,usuario:res.usuario||res.nombre_norm};
    impersonating=true;
    document.getElementById('nav').classList.remove('hide');
    greet.textContent='Hola, '+revName();
    toggleImpBar();
    loadClientes();
    loadAvisos();
  }catch(e){
    let msg;
    if(e&&e.code==='auth') msg='Sesión de admin vencida. Cerrá sesión y volvé a entrar.';
    else if(e&&e.error==='no_existe') msg='No se encontró a "'+nombre+'" en la base. El servidor (Render) probablemente NO está actualizado. Revisá server_api.js.';
    else if(e&&e.error==='no_admin') msg='Tu token no es de admin (no_admin).';
    else if(e&&e.error) msg='Error del servidor: '+e.error;
    else if(e instanceof TypeError) msg='El servidor no respondió (puede estar despertando). Esperá ~1 min y reintentá.';
    else msg='No pude entrar como '+nombre+(e&&e.message?(' — '+e.message):'');
    alert(msg);
  }
}

function tiempoDesde(ts){
  const d=Date.now()-ts;
  const min=Math.floor(d/60000);
  if(min<1)return'recién';
  if(min<60)return min+'m';
  const h=Math.floor(min/60);
  if(h<24)return h+'h';
  return Math.floor(h/24)+'d';
}

function fillCobro(id,servicio,btn){

  cobroCtx={id,cliente:c,servicio:nm,fecha:f,dias:dr,precio:precioServicio(svc)};
  setCobroVariante('amable');
}

/* ====== IA (Gemini/Claude vía backend /rev/ask) ====== */
let aiLastError='';
async function askGemini(prompt, fallback=''){
  aiLastError='';
  const paths=[CONFIG.aiPath,...(CONFIG.aiFallbackPaths||[])].filter((v,i,a)=>v&&a.indexOf(v)===i);
  for(const p of paths){
    try{
      const r=await API.call(p,{method:'POST',body:JSON.stringify({prompt})});
      if(r&&r.text&&r.text.trim()) return r.text.trim();
    }catch(e){
      if(e&&e.code==='auth'){location.reload();return fallback}
      aiLastError=(e&&(e.detail||e.error||e.message))||'sin_conexion';
      /* probar siguiente ruta */
    }
  }
  return fallback;
}

  else alert('La IA no respondió.\n\nDetalle: '+(aiLastError||'sin respuesta')+'\n\nRevisá la llave GEMINI_API_KEY en Render.');
  btn.textContent=old;btn.disabled=false;
}

let introDone=false;
function closeIntro(){
  if(introDone)return; introDone=true;
  const v=document.getElementById('introVid');
  try{v.pause()}catch(e){}
  const ov=document.getElementById('intro');
  ov.classList.add('out');
  setTimeout(()=>ov.remove(),550);
}
function startIntro(){
  const ov=document.getElementById('intro');
  if(!ov)return;
  const vid=document.getElementById('introVid');
  const brand=document.getElementById('introBrand');
  // duración tope 5s
  const ms=Math.min(CONFIG.introDuracion||4600,5000);
  if(CONFIG.introVideo){
    brand.classList.add('hide');
    vid.classList.remove('hide');
    vid.src=CONFIG.introVideo;
    let t=setTimeout(closeIntro,5000); // nunca pasar de 5s
    vid.addEventListener('ended',()=>{clearTimeout(t);closeIntro()});
    vid.addEventListener('error',()=>{clearTimeout(t);
      vid.classList.add('hide'); brand.classList.remove('hide'); setTimeout(closeIntro,ms);});
    const p=vid.play();
    if(p&&p.catch)p.catch(()=>{clearTimeout(t);
      vid.classList.add('hide'); brand.classList.remove('hide'); setTimeout(closeIntro,ms);});
  }else{
    setTimeout(closeIntro,ms);
  }
}
