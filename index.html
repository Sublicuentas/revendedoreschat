<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --txt:#0F2D52; --txt2:#3a567a; --muted:#6E8299;
  --accent:#FF3F6E; --accent-d:#D92954; --accentSoft:rgba(255,63,110,.1);
  --hero1:#e8313f; --hero2:#c41e2a;
  --good:#1fbf86; --goodSoft:rgba(31,191,134,.14);
  --warn:#e8a317; --warnSoft:rgba(232,163,23,.14);
  --exp:#ff5466; --expSoft:rgba(255,80,80,.12);
  --card:#fff; --field:#f4f8fc; --line:rgba(120,140,170,.16);
  --r:28px; --r-lg:36px; --r-sm:18px; --nav-h:78px;
  --sh:0 12px 0 #DDEAF5, 0 22px 40px rgba(29,90,150,.09);
  --sh-sm:0 8px 0 #E4EFF8, 0 14px 26px rgba(29,90,150,.08);
  --ff:'Fredoka','Nunito',system-ui,sans-serif;
  --fn:'Nunito',system-ui,sans-serif;
  --fb:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
html,body{
  background:
    radial-gradient(560px 320px at -12% -8%, rgba(255,236,95,.72), transparent 62%),
    radial-gradient(560px 320px at 112% -8%, rgba(46,199,255,.46), transparent 64%),
    linear-gradient(180deg,#FFFFFF 0%,#EEF7FF 56%,#F8FBFF 100%) fixed;
  color:var(--txt); font-family:var(--fb); -webkit-font-smoothing:antialiased;
  min-height:100dvh; overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.hide{display:none!important}
h1,h2,h3,.disp{font-family:var(--ff)}

.wrap{width:100%;max-width:520px;margin:0 auto;padding:14px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px)}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:13px;padding:4px 2px 14px}
.av-brand{width:62px;height:62px;border-radius:22px;overflow:hidden;flex:none;background:#10284B;
  box-shadow:0 10px 0 #DDEAF5,0 18px 30px rgba(25,75,130,.14)}
.av-brand img{width:190%;height:190%;object-fit:cover;object-position:50% 15%;transform:translateY(-2px)}
.tb-txt{flex:1;min-width:0}
.tb-txt h1{font-size:31px;letter-spacing:-.4px;line-height:1}
.tb-txt .greet{display:block;font-size:14px;color:var(--muted);font-weight:800;font-family:var(--fn);margin-top:4px}
.icon-btn{width:54px;height:54px;border-radius:20px;background:#fff;display:grid;place-items:center;
  flex:none;box-shadow:var(--sh-sm);transition:.15s}
.icon-btn:active{transform:translateY(2px)}
.icon-btn svg{width:22px;height:22px;stroke:var(--txt);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.screen{display:none;animation:fade .3s ease both}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.scr-title{font-size:32px;letter-spacing:-.6px;margin:6px 2px 16px}

/* HERO */
.hero{border-radius:30px;padding:20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden;min-height:136px;
  background:linear-gradient(135deg,var(--hero1),var(--hero2));box-shadow:0 14px 0 #f3c9cd,0 26px 44px rgba(200,30,42,.18)}
.hero .hl{font-family:var(--fn);font-weight:900;letter-spacing:.18em;font-size:12px;opacity:.9}
.hero .hv{font-family:var(--ff);font-weight:700;font-size:clamp(40px,11vw,50px);line-height:1;margin-top:10px;letter-spacing:-1.5px}
.hero .hs{font-size:13.5px;opacity:.9;margin-top:10px;font-weight:600}

/* STATS */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{border-radius:24px;padding:15px 12px;background:#fff;box-shadow:var(--sh-sm)}
.stat .si{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;margin-bottom:11px}
.stat .si svg{width:18px;height:18px;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.stat .sv{font-family:var(--ff);font-weight:700;font-size:24px;line-height:1}
.stat .sl{font-size:11.5px;color:var(--muted);font-weight:700;font-family:var(--fn);margin-top:5px}
.si.exp{background:var(--expSoft);color:var(--exp)} .si.warn{background:var(--warnSoft);color:var(--warn)} .si.good{background:var(--goodSoft);color:var(--good)}

/* CARD */
.card{border-radius:var(--r);padding:18px;margin-bottom:14px;background:#fff;box-shadow:var(--sh)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h h2{font-size:19px;letter-spacing:-.2px}
.card-h a{font-size:13px;color:var(--accent);font-weight:800;font-family:var(--fn)}

/* RENEW / SERVICE ROWS */
.renew{display:flex;flex-direction:column;gap:9px}
.renew-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:20px;background:var(--field)}
.renew-item .av{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-family:var(--ff);
  font-weight:700;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-d));flex:none}
.renew-item .meta{flex:1;min-width:0}
.renew-item .nm{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.renew-item .pl{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:1px}
.pill{display:inline-block;padding:5px 11px;border-radius:11px;font-size:11.5px;font-weight:800;font-family:var(--fn);white-space:nowrap}
.pill.ok{color:var(--good);background:var(--goodSoft)}
.pill.due{color:var(--accent);background:var(--accentSoft)}
.pill.soon{color:var(--warn);background:var(--warnSoft)}
.pill.exp{color:var(--exp);background:var(--expSoft)}
.pill.mut{color:var(--muted);background:var(--field)}

/* CLIENT CARD */
.cli-card{border-radius:var(--r);padding:16px;margin-bottom:12px;background:#fff;box-shadow:var(--sh)}
.cli-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cli-name{font-family:var(--ff);font-weight:700;font-size:18px;letter-spacing:-.2px}
.cli-tel{font-size:13px;color:var(--muted);font-weight:600;margin-top:1px}
.svc-list{margin-top:13px;display:flex;flex-direction:column;gap:9px}
.svc{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--field);border-radius:18px;padding:12px 13px}
.svc .dot-s{width:9px;height:9px;border-radius:50%;flex:none}
.dot-s.ok{background:var(--good)} .dot-s.soon{background:var(--warn)} .dot-s.due,.dot-s.exp{background:var(--exp)} .dot-s.mut{background:var(--muted)}
.svc .nm{font-weight:700;font-size:14px}
.svc .mt{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.cli-actions{display:flex;gap:9px;margin-top:13px}
.act{flex:1;text-align:center;padding:12px;border-radius:16px;font-family:var(--fn);font-weight:800;font-size:13.5px;transition:.15s}
.act:active{transform:translateY(1px)}
.act.primary{background:var(--accent);color:#fff;box-shadow:0 6px 0 var(--accent-d)}
.act.ghost{background:var(--field);color:var(--txt)}

/* SEARCH + SEG */
.search{display:flex;align-items:center;gap:10px;background:#fff;border-radius:20px;padding:14px 16px;margin-bottom:13px;box-shadow:var(--sh-sm)}
.search svg{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:2;flex:none}
.search input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-weight:600}
.search input::placeholder{color:var(--muted)}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg button{flex:1;padding:12px;border-radius:16px;background:#fff;color:var(--muted);font-family:var(--fn);font-weight:800;font-size:13px;box-shadow:var(--sh-sm);transition:.15s}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 6px 0 var(--accent-d)}

/* PRECIOS */
.price{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.price:last-child{border:none}
.price .pn{font-weight:700;font-size:15px}
.price .psub{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}
.price .pv{font-family:var(--ff);font-weight:700;font-size:16px;color:var(--good)}

/* AULA */
.aula-wrap{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);height:calc(100dvh - 240px);min-height:420px;background:#fff}
.aula-wrap iframe{width:100%;height:100%;border:0}

/* EMPTY / SPIN */
.empty{text-align:center;padding:44px 24px;color:var(--muted);font-weight:600}
.empty .ico{font-size:42px;margin-bottom:12px}
.empty b{display:block;color:var(--txt);font-family:var(--ff);font-size:18px;margin-bottom:6px}
.spin{width:34px;height:34px;border:3px solid #dfeaf5;border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:70px auto}
@keyframes sp{to{transform:rotate(360deg)}}

/* NAV */
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(520px,100%);height:var(--nav-h);z-index:20;
  display:flex;justify-content:space-around;align-items:center;
  background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);
  font-family:var(--fn);font-weight:900;font-size:10.5px;padding:8px 0;position:relative;transition:.15s}
.nav-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.on{color:var(--accent)}
.nav-btn.on::before{content:"";position:absolute;top:0;width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}

/* LOGIN */
#login{position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px;overflow-y:auto;
  background:
    radial-gradient(520px 280px at 15% 2%,#FFF3B1,transparent 62%),
    radial-gradient(520px 300px at 100% 0,#B8F1FF,transparent 62%),
    linear-gradient(180deg,#FFFFFF,#EEF7FF)}
.login-robot{width:min(42vw,150px);border-radius:34px;background:#10284B;overflow:hidden;
  box-shadow:0 16px 0 #DDEAF5,0 30px 50px rgba(25,75,130,.2);animation:floaty 3.5s ease-in-out infinite;flex:none}
.login-robot img{width:120%;height:120%;object-fit:cover;object-position:50% 12%;display:block;transform:translate(-8%,-6%)}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.login-card{width:100%;max-width:360px;margin-top:22px;background:#fff;border-radius:34px;padding:28px 24px;
  box-shadow:0 18px 0 rgba(213,229,243,.75),0 32px 54px rgba(26,70,118,.12)}
.login-card h2{font-size:31px;text-align:center;letter-spacing:-.4px}
.login-card p{font-size:13.5px;color:var(--muted);text-align:center;font-weight:800;font-family:var(--fn);margin:6px 0 22px}
.field{display:flex;align-items:center;gap:11px;background:var(--field);border:2px solid transparent;
  border-radius:18px;padding:15px 16px;margin-bottom:12px;transition:.15s}
.field:focus-within{border-color:var(--accent)}
.field svg{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:2;flex:none}
.field input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-weight:600}
.field input::placeholder{color:var(--muted)}
.login-btn{width:100%;margin-top:8px;padding:16px;border-radius:24px;background:var(--accent);color:#fff;
  font-family:var(--ff);font-weight:700;font-size:16px;letter-spacing:.3px;
  box-shadow:0 10px 0 var(--accent-d),0 18px 28px rgba(255,63,110,.22);transition:.15s}
.login-btn:active{transform:translateY(3px);box-shadow:0 7px 0 var(--accent-d)}
.login-btn:disabled{opacity:.7}
.login-err{color:var(--accent);font-size:13px;text-align:center;font-weight:700;margin-top:14px;min-height:18px}
.login-foot{font-size:11.5px;color:var(--muted);text-align:center;font-weight:700;margin-top:18px;line-height:1.5}

/* ADMIN (modo dios) */
.imp-bar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:#10284B;color:#fff;border-radius:18px;padding:11px 14px;margin-bottom:14px;box-shadow:var(--sh-sm)}
.imp-bar .lbl{font-size:13px;font-weight:800;font-family:var(--fn);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imp-bar .lbl b{font-family:var(--ff);font-weight:700}
.imp-bar button{flex:none;background:#fff;color:#10284B;font-family:var(--fn);font-weight:800;font-size:12.5px;padding:8px 13px;border-radius:12px}
.rev-card{display:flex;align-items:center;gap:12px;border-radius:22px;padding:14px;margin-bottom:11px;background:#fff;box-shadow:var(--sh-sm);transition:.15s}
.rev-card:active{transform:translateY(2px)}
.rev-card .rav{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;font-family:var(--ff);font-weight:700;font-size:18px;color:#fff;flex:none;background:#10284B}
.rev-card .rav.off{background:#aab4c4}
.rev-card .ri{flex:1;min-width:0}
.rev-card .rn{font-family:var(--ff);font-weight:700;font-size:16px;letter-spacing:-.2px}
.rev-card .rs{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.rev-card .rs .x{color:var(--exp)} .rev-card .rs .w{color:var(--warn)}
.rev-card .go{flex:none;width:34px;height:34px;border-radius:11px;background:var(--field);display:grid;place-items:center}
.rev-card .go svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.rev-off-tag{font-size:10.5px;font-weight:800;font-family:var(--fn);color:var(--muted);background:var(--field);padding:3px 8px;border-radius:8px}

/* COBRO MODAL */
.cobro-overlay{position:fixed;inset:0;z-index:95;background:rgba(15,45,82,.4);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center}
.cobro-overlay.show{display:flex}
.cobro-sheet{width:100%;max-width:520px;background:#fff;border-radius:30px 30px 0 0;
  padding:8px 20px calc(22px + env(safe-area-inset-bottom));animation:up .25s ease}
@keyframes up{from{transform:translateY(40px);opacity:.6}}
.grab{width:42px;height:5px;background:#dde7f1;border-radius:5px;margin:8px auto 16px}
.cobro-sheet h3{font-size:21px}
.cobro-sub{font-size:13px;color:var(--muted);font-weight:700;font-family:var(--fn);margin:2px 0 16px}
.cobro-text{width:100%;background:var(--field);border:none;border-radius:18px;padding:15px;color:var(--txt);
  font-size:14.5px;line-height:1.55;font-family:inherit;font-weight:500;resize:vertical;min-height:130px;margin-bottom:14px;outline:none}
.cobro-actions{display:flex;gap:10px}
.cobro-actions .act{padding:15px}
@media(min-width:600px){.cobro-overlay{align-items:center}.cobro-sheet{border-radius:30px;margin:0 16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-robot"><img src="" id="loginLogo" alt="Subli"></div>
  <div class="login-card">
    <h2>Bienvenido</h2>
    <p>Entrá con tu usuario y tu clave</p>
    <div class="field">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input id="inUser" placeholder="Usuario (ej. geissel)" autocomplete="username" autocapitalize="none">
    </div>
    <div class="field">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input id="inPass" type="password" placeholder="Clave" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-foot">La primera vez, la clave que escribás queda guardada como la tuya.</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="wrap hide">
  <div class="topbar">
    <div class="av-brand"><img src="" id="brandLogo" alt="Subli"></div>
    <div class="tb-txt">
      <h1>Sublicuentas</h1>
      <span class="greet" id="greet">Panel de revendedores</span>
    </div>
    <button class="icon-btn" onclick="logout()" aria-label="Salir">
      <svg viewBox="0 0 24 24"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l-5-5 5-5M5 12h12"/></svg>
    </button>
  </div>
  <div id="impBar" class="hide"></div>
  <div id="content"><div class="spin"></div></div>
</div>

<nav class="nav hide" id="nav">
  <button class="nav-btn on" data-v="inicio" onclick="go('inicio')">
    <svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Inicio</button>
  <button class="nav-btn" data-v="clientes" onclick="go('clientes')">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>Clientes</button>
  <button class="nav-btn" data-v="renovar" onclick="go('renovar')">
    <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.65 4.36A9 9 0 0 0 20.5 15"/></svg>Renovar</button>
  <button class="nav-btn" data-v="precios" onclick="go('precios')">
    <svg viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1 0-4h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>Precios</button>
  <button class="nav-btn" data-v="aula" onclick="go('aula')">
    <svg viewBox="0 0 24 24"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 3 2 6 2s6-1 6-2v-5"/></svg>Aula</button>
</nav>

<!-- COBRO MODAL -->
<div class="cobro-overlay" id="cobroOverlay" onclick="if(event.target===this)closeCobro()">
  <div class="cobro-sheet">
    <div class="grab"></div>
    <h3>Mensaje de cobro</h3>
    <div class="cobro-sub" id="cobroSub"></div>
    <div id="cobroSeg"></div>
    <textarea class="cobro-text" id="cobroText"></textarea>
    <div class="cobro-actions">
      <button class="act ghost" onclick="copyCobro(event)">Copiar</button>
      <button class="act primary" id="cobroWa" onclick="sendWa()">Enviar por WhatsApp</button>
    </div>
  </div>
</div>

<script>
let rev=null, clientes=[], cobroTel='', current='inicio';
let isAdmin=false, adminToken=null, adminRevs=[], impersonating=false;

/* API */
const API={
  base:CONFIG.apiBase.replace(/\/$/,''),
  token:st('get','rev_token'),
  setToken(t){this.token=t;st('set','rev_token',t)},
  clear(){this.token=null;st('del','rev_token');st('del','rev_data')},
  async call(path,opts={}){
    const r=await fetch(this.base+path,{...opts,headers:{'Content-Type':'application/json',
      ...(this.token?{Authorization:'Bearer '+this.token}:{}),...(opts.headers||{})}});
    if(r.status===401){this.clear();throw{code:'auth'}}
    if(!r.ok){let e={};try{e=await r.json()}catch(_){};throw e}
    return r.json();
  }
};
function st(op,k,v){try{if(op==='get')return localStorage.getItem(k);if(op==='set')localStorage.setItem(k,v);if(op==='del')localStorage.removeItem(k)}catch(e){return null}}

/* helpers */
function pick(o,keys){for(const k of keys){if(o&&o[k]!=null&&o[k]!=='')return o[k]}return null}
function norm(s){return(s||'').toString().trim().toLowerCase()}
function parseFecha(v){
  if(v==null)return null;
  if(typeof v==='object'){if(v.seconds)return new Date(v.seconds*1000);if(v._seconds)return new Date(v._seconds*1000);if(v.toDate)return v.toDate()}
  if(typeof v==='number')return new Date(v<1e12?v*1000:v);
  const s=v.toString().trim();
  let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){let[,d,mo,y]=m;y=y.length===2?'20'+y:y;return new Date(+y,+mo-1,+d)}
  const d=new Date(s);return isNaN(d)?null:d;
}
function fmtFecha(d){return d?d.toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'numeric'}):'—'}
function dias(d){if(!d)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((d-h)/86400000)}
function estado(d){const n=dias(d);
  if(n===null)return{c:'mut',t:'Sin fecha',n:9999};
  if(n<0)return{c:'exp',t:`Venció hace ${Math.abs(n)}d`,n};
  if(n===0)return{c:'due',t:'Vence hoy',n};
  if(n<=CONFIG.avisoDias)return{c:'soon',t:`En ${n}d`,n};
  return{c:'ok',t:`En ${n}d`,n};
}
function nombreCli(c){return c.nombrePerfil||c.nombre||c.nombre_norm||'Cliente'}
const enc=s=>(s||'').toString().replace(/"/g,'&quot;');
function flat(){const out=[];
  clientes.forEach(c=>(Array.isArray(c.servicios)?c.servicios:[]).forEach(s=>{
    const f=parseFecha(pick(s,CONFIG.campos.vencimiento));
    out.push({cliente:c,nombre:pick(s,CONFIG.campos.servicio)||'Servicio',fecha:f,est:estado(f)});
  }));
  return out.sort((a,b)=>a.est.n-b.est.n);
}

/* login */
async function doLogin(){
  const usuario=inUser.value.trim(), password=inPass.value.trim();
  loginErr.textContent='';
  if(!usuario||!password){loginErr.textContent='Escribí tu usuario y tu clave.';return}
  if(CONFIG.apiBase.includes('TU-BOT')){loginErr.textContent='Falta poner la URL de la API (CONFIG.apiBase).';return}
  loginBtn.disabled=true; loginBtn.textContent='Entrando…';
  try{
    const res=await API.call('/rev/login',{method:'POST',body:JSON.stringify({usuario,password})});
    API.setToken(res.token);
    if(res.admin){
      isAdmin=true; adminToken=res.token;
      st('set','rev_admin','1'); st('del','rev_data');
      enterAdmin();
      return;
    }
    rev={nombre:res.nombre,nombre_norm:res.nombre_norm};
    st('set','rev_data',JSON.stringify(rev)); st('del','rev_admin');
    enterApp();
  }catch(e){
    const map={credenciales:'Usuario o clave incorrectos.',inactivo:'Tu cuenta está inactiva.',faltan_datos:'Faltan datos.'};
    loginErr.textContent=map[e.error]||'No pude conectar. Revisá la URL de la API.';
  }finally{loginBtn.disabled=false;loginBtn.textContent='Entrar'}
}
function enterApp(){
  login.classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('nav').classList.remove('hide');
  greet.textContent='Hola, '+(rev.nombre||rev.nombre_norm||'revendedor');
  toggleImpBar();
  loadClientes();
}
function toggleImpBar(){
  const b=document.getElementById('impBar');
  if(impersonating){
    b.className='imp-bar';
    b.innerHTML=`<div class="lbl">👁 Viendo como <b>${rev.nombre||rev.nombre_norm}</b></div><button onclick="volverAdmin()">Volver</button>`;
  } else { b.className='hide'; b.innerHTML=''; }
}
function logout(){API.clear();st('del','rev_admin');location.reload()}

/* ── ADMIN (modo dios, solo lectura) ── */
let admF='';
async function enterAdmin(){
  impersonating=false;
  login.classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('nav').classList.add('hide');
  document.getElementById('impBar').className='hide';
  greet.textContent='Modo administrador';
  content.innerHTML='<div class="spin"></div>';
  try{ adminRevs=await API.call('/rev/admin/revendedores',{headers:{Authorization:'Bearer '+adminToken}}); renderAdmin(); }
  catch(e){ if(e.code==='auth'){location.reload();return}
    content.innerHTML=`<div class="card"><div class="empty"><div class="ico">⚠️</div><b>No pude cargar los revendedores</b>Revisá la API.</div></div>`; }
}
function renderAdmin(){
  const totCli=adminRevs.reduce((a,r)=>a+r.clientes,0);
  const totVenc=adminRevs.reduce((a,r)=>a+r.vencidos,0);
  const activos=adminRevs.filter(r=>r.activo).length;
  content.innerHTML=`
  <div class="hero">
    <div class="hl">RED DE REVENDEDORES</div>
    <div class="hv">${adminRevs.length}</div>
    <div class="hs">${activos} activos · ${totCli} clientes · ${totVenc} vencidos</div>
  </div>
  <div class="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="admSearch" placeholder="Buscar revendedor" oninput="admF=this.value;renderAdmList()">
  </div>
  <div id="admList"></div>`;
  renderAdmList();
}
function renderAdmList(){
  const f=norm(admF);
  const list=adminRevs.filter(r=>!f||norm(r.nombre).includes(f)||r.nombre_norm.includes(f));
  document.getElementById('admList').innerHTML=list.length?list.map(revCard).join(''):
    `<div class="card"><div class="empty"><div class="ico">🔍</div>Sin resultados.</div></div>`;
}
function revCard(r){
  const ini=(r.nombre[0]||'?').toUpperCase();
  const parts=[`${r.clientes} ${r.clientes===1?'cliente':'clientes'}`];
  if(r.vencidos)parts.push(`<span class="x">${r.vencidos} vencidos</span>`);
  if(r.porVencer)parts.push(`<span class="w">${r.porVencer} por vencer</span>`);
  return `<div class="rev-card" onclick='verComo(${JSON.stringify(r.nombre_norm)},${JSON.stringify(r.nombre)})'>
    <div class="rav ${r.activo?'':'off'}">${ini}</div>
    <div class="ri"><div class="rn">${r.nombre}${r.activo?'':' <span class="rev-off-tag">inactivo</span>'}</div>
      <div class="rs">${parts.join('<span style="opacity:.4">·</span>')}</div></div>
    <div class="go"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
  </div>`;
}
async function verComo(nombre_norm,nombre){
  try{
    const res=await API.call('/rev/admin/impersonate',{method:'POST',body:JSON.stringify({nombre_norm}),headers:{Authorization:'Bearer '+adminToken}});
    API.token=res.token;                 // token del revendedor solo en memoria
    rev={nombre:res.nombre,nombre_norm:res.nombre_norm};
    impersonating=true;
    document.getElementById('nav').classList.remove('hide');
    greet.textContent='Hola, '+(rev.nombre||rev.nombre_norm);
    toggleImpBar();
    loadClientes();
  }catch(e){ alert('No pude entrar como '+nombre); }
}
function volverAdmin(){
  API.token=adminToken;
  impersonating=false; rev=null;
  enterAdmin();
}

async function loadClientes(){
  try{clientes=await API.call('/rev/clientes');go('inicio')}
  catch(e){
    if(e.code==='auth'){location.reload();return}
    content.innerHTML=`<div class="card"><div class="empty"><div class="ico">⚠️</div><b>No pude cargar tus clientes</b>Revisá que la API esté arriba.</div></div>`;
  }
}

/* nav */
const content=document.getElementById('content');
function go(v){current=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  window.scrollTo(0,0);
  ({inicio:vInicio,clientes:vClientes,renovar:vRenovar,precios:vPrecios,aula:vAula}[v])();
}

/* INICIO */
function vInicio(){
  const fs=flat();
  const exp=fs.filter(s=>s.est.c==='exp'||s.est.c==='due').length;
  const soon=fs.filter(s=>s.est.c==='soon').length;
  const ok=fs.filter(s=>s.est.c==='ok').length;
  const prox=fs.filter(s=>s.est.n<9999).slice(0,5);
  content.innerHTML=`
  <div class="hero">
    <div class="hl">CARTERA TOTAL</div>
    <div class="hv">${clientes.length}</div>
    <div class="hs">clientes activos · ${fs.length} servicios</div>
  </div>
  <div class="grid3">
    <div class="stat"><div class="si exp"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5M12 16h.01"/></svg></div><div class="sv">${exp}</div><div class="sl">Vencidos</div></div>
    <div class="stat"><div class="si warn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></div><div class="sv">${soon}</div><div class="sl">Por vencer</div></div>
    <div class="stat"><div class="si good"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><div class="sv">${ok}</div><div class="sl">Al día</div></div>
  </div>
  <div class="card">
    <div class="card-h"><h2>Próximas renovaciones</h2><a onclick="go('renovar')">Ver todas</a></div>
    ${prox.length?`<div class="renew">${prox.map(renRow).join('')}</div>`:
      `<div class="empty" style="padding:24px"><div class="ico">📭</div>Sin fechas registradas.</div>`}
  </div>`;
}
function renRow(s){
  const ini=(nombreCli(s.cliente)[0]||'?').toUpperCase();
  return `<div class="renew-item">
    <div class="av">${ini}</div>
    <div class="meta"><div class="nm">${nombreCli(s.cliente)}</div><div class="pl">${s.nombre}</div></div>
    <span class="pill ${s.est.c}">${s.est.t}</span>
  </div>`;
}

/* CLIENTES */
let cliF='';
function vClientes(){
  content.innerHTML=`
  <div class="scr-title">Mis clientes</div>
  <div class="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="cliSearch" placeholder="Buscar cliente o teléfono" oninput="cliF=this.value;renderCli()">
  </div>
  <div id="cliList"></div>`;
  renderCli();
}
function renderCli(){
  const f=norm(cliF);
  const list=clientes.filter(c=>!f||norm(nombreCli(c)).includes(f)||(c.telefono||'').includes(f))
    .sort((a,b)=>norm(nombreCli(a)).localeCompare(norm(nombreCli(b))));
  const el=document.getElementById('cliList');if(!el)return;
  el.innerHTML=list.length?list.map(cliCard).join(''):`<div class="card"><div class="empty"><div class="ico">🔍</div>Sin resultados.</div></div>`;
}
function cliCard(c){
  const svcs=Array.isArray(c.servicios)?c.servicios:[];
  const peor=svcs.map(s=>estado(parseFecha(pick(s,CONFIG.campos.vencimiento)))).reduce((a,b)=>b.n<a.n?b:a,{n:9999,c:'mut'});
  return `<div class="cli-card">
    <div class="cli-top">
      <div><div class="cli-name">${nombreCli(c)}</div><div class="cli-tel">${c.telefono||'sin teléfono'}</div></div>
      <span class="pill ${peor.c}">${svcs.length} ${svcs.length===1?'servicio':'servicios'}</span>
    </div>
    ${svcs.length?`<div class="svc-list">${svcs.map(svcRow).join('')}</div>`:''}
    <div class="cli-actions"><button class="act primary" onclick='openCobro("${c.id}","")'>Cobro</button>${waBtn(c)}</div>
  </div>`;
}
function svcRow(s){
  const nm=pick(s,CONFIG.campos.servicio)||'Servicio';
  const f=parseFecha(pick(s,CONFIG.campos.vencimiento)),e=estado(f);
  const mt=[f?`Vence ${fmtFecha(f)}`:null].filter(Boolean).join(' · ');
  return `<div class="svc">
    <div style="display:flex;align-items:center;gap:11px;min-width:0">
      <span class="dot-s ${e.c}"></span>
      <div style="min-width:0"><div class="nm">${nm}</div>${mt?`<div class="mt">${mt}</div>`:''}</div>
    </div>
    <span class="pill ${e.c}">${e.t}</span>
  </div>`;
}
function waBtn(c){const t=(c.telefono||c.telefono_norm||'').toString().replace(/\D/g,'');
  return t?`<a class="act ghost" href="https://wa.me/504${t}" target="_blank">WhatsApp</a>`:''}

/* RENOVAR */
let renF='todos';
function vRenovar(){
  content.innerHTML=`
  <div class="scr-title">Renovaciones</div>
  <div class="seg">
    ${[['todos','Todos'],['vencidos','Vencidos'],['porvencer','Por vencer']].map(([k,l])=>
      `<button class="${renF===k?'on':''}" onclick="renF='${k}';renderRen()">${l}</button>`).join('')}
  </div>
  <div id="renList"></div>`;
  renderRen();
}
function renderRen(){
  document.querySelectorAll('.seg button').forEach(b=>{
    const k=b.textContent==='Todos'?'todos':b.textContent==='Vencidos'?'vencidos':'porvencer';
    b.classList.toggle('on',k===renF);
  });
  let fs=flat().filter(s=>s.est.n<9999);
  if(renF==='vencidos')fs=fs.filter(s=>s.est.c==='exp'||s.est.c==='due');
  if(renF==='porvencer')fs=fs.filter(s=>s.est.c==='soon');
  document.getElementById('renList').innerHTML= fs.length
    ? fs.map(s=>`<div class="cli-card">
        <div class="cli-top">
          <div><div class="cli-name">${nombreCli(s.cliente)}</div><div class="cli-tel">${s.nombre}</div></div>
          <span class="pill ${s.est.c}">${s.est.t}</span></div>
        <div class="cli-actions">
          <button class="act primary" onclick='openCobro("${s.cliente.id}","${enc(s.nombre)}")'>Mensaje de cobro</button>${waBtn(s.cliente)}
        </div></div>`).join('')
    : `<div class="card"><div class="empty"><div class="ico">✅</div><b>Todo en orden</b>No hay nada en este filtro.</div></div>`;
}

/* COBRO */
function openCobro(id,servicio){
  const c=clientes.find(x=>x.id===id);if(!c)return;
  const svcs=Array.isArray(c.servicios)?c.servicios:[];
  cobroSub.textContent=nombreCli(c)+' · sin valor (vos cobrás a tu manera)';
  cobroTel=(c.telefono||c.telefono_norm||'').toString().replace(/\D/g,'');
  cobroWa.style.opacity=cobroTel?'1':'.5'; cobroWa.style.pointerEvents=cobroTel?'auto':'none';
  const seg=document.getElementById('cobroSeg');
  if(svcs.length>1&&servicio===''){
    seg.innerHTML=`<div class="seg" style="margin-bottom:12px">${svcs.map((s,i)=>{const n=pick(s,CONFIG.campos.servicio)||('Servicio '+(i+1));
      return `<button class="${i===0?'on':''}" onclick='fillCobro("${id}","${enc(n)}",this)'>${n}</button>`}).join('')}</div>`;
  } else seg.innerHTML='';
  fillCobro(id,servicio||(pick(svcs[0]||{},CONFIG.campos.servicio)||''));
  cobroOverlay.classList.add('show');
}
function fillCobro(id,servicio,btn){
  if(btn){btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
  const c=clientes.find(x=>x.id===id);const svcs=Array.isArray(c.servicios)?c.servicios:[];
  const svc=svcs.find(s=>(pick(s,CONFIG.campos.servicio)||'')===servicio)||svcs[0]||{};
  const nm=pick(svc,CONFIG.campos.servicio)||servicio||'su servicio';
  const f=parseFecha(pick(svc,CONFIG.campos.vencimiento)),dr=dias(f);
  cobroText.value=CONFIG.cobroTemplate.replace(/{cliente}/g,nombreCli(c)).replace(/{servicio}/g,nm)
    .replace(/{vencimiento}/g,fmtFecha(f)).replace(/{dias}/g,dr!=null?dr:'—');
}
function sendWa(){if(cobroTel)window.open('https://wa.me/504'+cobroTel+'?text='+encodeURIComponent(cobroText.value),'_blank')}
function copyCobro(ev){navigator.clipboard?.writeText(cobroText.value);const b=ev.target,o=b.textContent;b.textContent='¡Copiado!';setTimeout(()=>b.textContent=o,1200)}
function closeCobro(){cobroOverlay.classList.remove('show')}

document.getElementById('brandLogo').src=LOGO;

  if(!API.token)return;

  try{rev=JSON.parse(st('get','rev_data'))}catch(e){};
  if(rev)enterApp();
});
